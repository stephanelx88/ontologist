    domain: "finance-and-banking"
    decision: "Domain archetype is Inspection (artifact → rules → anomaly detection)"
    alternatives_considered:
      - option: "Diagnostic archetype (symptoms → root cause)"
        faithfulness_to_source: 0.3
        agent_utility: 0.4
